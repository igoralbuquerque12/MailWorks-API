services:
  postgres:
    image: postgres:16-alpine
    container_name: mailworks_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mailworks
      POSTGRES_PASSWORD: mailworks
      POSTGRES_DB: mailworks
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
